target-version = "py311"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "B",        # bugbear
    "UP",       # pyupgrade
    "SIM",      # simplify
    "RUF",      # ruff-specific
]
ignore = [
    "E501",  # line length handled by formatter
]

[lint.per-file-ignores]
"tests/**" = ["B", "SIM"]

[format]
quote-style = "double"
indent-style = "space"
