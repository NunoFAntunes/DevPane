name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for PyGObject
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            libcairo2-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-gtksource-5 \
            xvfb

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy src

      - name: Pytest under Xvfb
        run: xvfb-run -a pytest -q
